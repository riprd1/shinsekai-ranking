<!doctype html>

<head>

<title>日プ新世界まとめ｜練習生情報・順位・投票リンク</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;
  --card:rgba(8,18,35,.64);
  --line:rgba(255,255,255,.10);
  --txt:#f7fbff;
  --sub:rgba(255,255,255,.85);
  --accent:#7dd3ff;
  --accent2:#4da3ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  overflow-x:hidden;
  position:relative;
}

/* ===== 波アニメーション ===== */
body::before,
body::after{
  content:"";
  position:fixed;
  left:-20%;
  width:140%;
  height:55vh;
  pointer-events:none;
  z-index:-2;
  filter:blur(12px);
}

body::before{
  top:-10vh;
  background:
    radial-gradient(60% 120% at 20% 40%, rgba(125,211,255,.40), transparent 60%),
    radial-gradient(50% 120% at 80% 20%, rgba(77,163,255,.35), transparent 65%);
  animation:wave1 18s ease-in-out infinite;
}

body::after{
  bottom:-15vh;
  background:
    radial-gradient(60% 120% at 70% 60%, rgba(125,211,255,.30), transparent 60%),
    radial-gradient(50% 120% at 30% 80%, rgba(77,163,255,.25), transparent 65%);
  animation:wave2 22s ease-in-out infinite;
}

@keyframes wave1{
  0%{transform:translateX(0)}
  50%{transform:translateX(-5%)}
  100%{transform:translateX(0)}
}
@keyframes wave2{
  0%{transform:translateX(0)}
  50%{transform:translateX(6%)}
  100%{transform:translateX(0)}
}

/* ===== レイアウト ===== */
.wrap{
  max-width:820px;
  margin:0 auto;
  padding:36px 18px 70px;
}

.hero{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:24px 20px;
  box-shadow:0 16px 40px rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
}

.hero h1{
  margin:0 0 16px;
  font-size:20px;
  font-weight:700;
  line-height:1.6;
  letter-spacing:.04em;
}

.hero p{
  margin:0 0 18px;
  font-size:13.8px;
  line-height:2.0;
  color:var(--sub);
}

.btn{
  display:inline-block;
  padding:9px 16px;
  border-radius:999px;
  font-weight:700;
  font-size:12.5px;
  text-decoration:none;
  color:#061325;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 8px 22px rgba(0,0,0,.35);
}

.grid{
  margin-top:20px;
  display:grid;
  gap:16px;
}

.card{
  background:rgba(8,18,35,.55);
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
  backdrop-filter:blur(8px);
}

h2{
  margin:0 0 12px;
  font-size:15px;
  font-weight:700;
}

ul{
  margin:0;
  padding-left:18px;
  font-size:13.5px;
  line-height:1.9;
  color:var(--sub);
}

/* ===== フッター（コンパクト版） ===== */
.footer{
  margin-top:26px;
  padding:14px 10px;
  border:1px solid var(--line);
  background:rgba(8,18,35,.55);
  border-radius:14px;
  text-align:center;
  font-size:12px;
  font-weight:700;
  letter-spacing:.04em;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
  backdrop-filter:blur(10px);
}

.footer a{
  display:inline-block;
  padding:7px 14px;
  margin:4px 6px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.04em;
  color:rgba(255,255,255,.96);
  text-decoration:none;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.10);
  text-shadow:0 2px 6px rgba(0,0,0,.35);
}

.footer a:hover{
  background:rgba(125,211,255,.25);
  border-color:rgba(125,211,255,.45);
}
</style>
</head>

</section>

</main>
</body>
</html>

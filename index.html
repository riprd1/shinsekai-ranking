<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>日プ新世界まとめ｜練習生情報・順位・投票リンク</title>

<style>
:root{
  --bg1:#0f1320;
  --bg2:#161b2e;

  /* ★ここが重要：カードの下地を“暗め”に固定して文字が消えないように */
  --card:rgba(10,14,25,.58);
  --card2:rgba(10,14,25,.40);

  --line:rgba(255,255,255,.14);
  --txt:#ffffff;
  --sub:rgba(255,255,255,.86);

  --accent:#9a86ff;
  --accent2:#6fc3ff;
}

/* ===== 背景 ===== */
body{
  margin:0;
  font-family: system-ui, -apple-system, "Noto Sans JP","Hiragino Sans","Yu Gothic",sans-serif;
  color:var(--txt);
  background: linear-gradient(180deg, var(--bg1), var(--bg2));
  position:relative;
  overflow-x:hidden;
}

/* ===== 流れる上品な波 ===== */
body::before{
  content:"";
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 30% 30%, rgba(154,134,255,.18), transparent 60%),
    radial-gradient(circle at 70% 60%, rgba(111,195,255,.14), transparent 60%);
  animation: waveMove 35s linear infinite;
  z-index:-1;
}

@keyframes waveMove{
  0%{ transform: translate(0,0) rotate(0deg); }
  50%{ transform: translate(-5%, -5%) rotate(180deg); }
  100%{ transform: translate(0,0) rotate(360deg); }
}

/* ===== レイアウト ===== */
.wrap{
  max-width:960px;
  margin:0 auto;
  padding:40px 20px 80px;
}

.hero{
  background:linear-gradient(180deg, var(--card), var(--card2));
  border:1px solid var(--line);
  border-radius:20px;
  padding:32px 28px;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.hero h1{
  margin:0 0 20px;
  font-size:20px;
  font-weight:800;
  letter-spacing:.04em;
  line-height:1.55;
  text-shadow:0 2px 16px rgba(0,0,0,.35);
}

.hero p{
  margin:0 0 22px;
  font-size:14px;
  line-height:2.05;
  color:var(--sub);
  font-weight:500;
  text-shadow:0 1px 14px rgba(0,0,0,.25);
}

.btn{
  display:inline-block;
  padding:11px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  letter-spacing:.05em;
  text-decoration:none;
  color:#0f1320;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 10px 26px rgba(0,0,0,.35);
}

.grid{
  margin-top:36px;
  display:grid;
  grid-template-columns:1fr;
  gap:22px;
}

.card{
  background:linear-gradient(180deg, var(--card), var(--card2));
  border:1px solid var(--line);
  border-radius:18px;
  padding:26px;
  box-shadow:0 8px 30px rgba(0,0,0,.25);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

h2{
  margin:0 0 14px;
  font-size:16px;
  font-weight:800;
  letter-spacing:.04em;
  text-shadow:0 2px 12px rgba(0,0,0,.25);
}

ul{
  margin:0;
  padding-left:18px;
  color:var(--sub);
  font-size:14px;
  line-height:2;
  font-weight:500;
}

.footer{
  margin-top:50px;
  padding-top:20px;
  border-top:1px solid var(--line);
  text-align:center;
  font-size:12px;
  color:rgba(255,255,255,.70);
}

.footer a{
  color:rgba(255,255,255,.92);
  text-decoration:none;
  margin:0 10px;
}

.footer a:hover{ text-decoration:underline; }
</style>
</head>

<body>

<section class="hero">

  </p>

    ▶ 今すぐ投票する

<section class="grid">

    <ul>

    </ul>
  </div>
</section>

<div class="footer">
  <a href="./about.html">About</a>
  <a href="./privacy.html">Privacy</a>
  <a href="./contact.html">Contact</a>
</div>

</main>
</body>
</html>

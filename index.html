<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>日プ新世界まとめ｜練習生情報・順位・投票リンク</title>

<style>
:root{
  --bg1:#0f1320;
  --bg2:#161b2e;
  --card:rgba(255,255,255,.05);
  --line:rgba(255,255,255,.08);
  --txt:#f1f2f7;
  --sub:rgba(255,255,255,.65);
  --accent:#9a86ff;
  --accent2:#6fc3ff;
}

/* ===== 背景 ===== */
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background: linear-gradient(180deg, var(--bg1), var(--bg2));
  position:relative;
  overflow-x:hidden;
}

/* ===== 流れる上品な波 ===== */
body::before{
  content:"";
  position:fixed;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:
    radial-gradient(circle at 30% 30%, rgba(154,134,255,.12), transparent 60%),
    radial-gradient(circle at 70% 60%, rgba(111,195,255,.10), transparent 60%);
  animation: waveMove 35s linear infinite;
  z-index:-1;
}

@keyframes waveMove{
  0%{ transform: translate(0,0) rotate(0deg); }
  50%{ transform: translate(-5%, -5%) rotate(180deg); }
  100%{ transform: translate(0,0) rotate(360deg); }
}

/* ===== レイアウト ===== */
.wrap{
  max-width:960px;
  margin:0 auto;
  padding:40px 20px 80px;
}

.hero{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:32px 28px;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
  backdrop-filter: blur(8px);
}

.hero h1{
  margin:0 0 24px;
  font-size:20px;
  font-weight:600;
  letter-spacing:.05em;
  line-height:1.6;
}

.hero p{
  margin:0 0 24px;
  font-size:13.5px;
  line-height:2.1;
  color:var(--sub);
}

.btn{
  display:inline-block;
  padding:10px 18px;
  border-radius:999px;
  font-weight:600;
  font-size:13px;
  letter-spacing:.05em;
  text-decoration:none;
  color:#0f1320;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 6px 18px rgba(0,0,0,.35);
}

.grid{
  margin-top:36px;
  display:grid;
  grid-template-columns:1fr;
  gap:22px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:18px;
  padding:26px;
  box-shadow:0 8px 30px rgba(0,0,0,.25);
  backdrop-filter: blur(6px);
}

h2{
  margin:0 0 16px;
  font-size:16px;
  font-weight:600;
  letter-spacing:.04em;
}

ul{
  margin:0;
  padding-left:18px;
  color:var(--sub);
  font-size:13.5px;
  line-height:2;
}

.footer{
  margin-top:50px;
  padding-top:20px;
  border-top:1px solid var(--line);
  text-align:center;
  font-size:12px;
  color:rgba(255,255,255,.55);
}

.footer a{
  color:rgba(255,255,255,.8);
  text-decoration:none;
  margin:0 10px;
}

.footer a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<main class="wrap">

<section class="hero">
  <h1>

  </p>

  <a class="btn" href="https://riprd1.github.io/fanvote-produce101japan/" target="_blank" rel="noopener">
    ▶ 今すぐ投票する
  </a>
</section>

<section class="grid">

  <div class="card">
    <h2>これから追加する内容</h2>
    <ul>
      <li>練習生プロフィールまとめ（年齢・出身・身長など）</li>

    </ul>
  </div>

      <li>権利者様からのご連絡には速やかに対応します。</li>
    </ul>
  </div>

</section>

<div class="footer">
  <a href="./about.html">About</a>
  <a href="./privacy.html">Privacy</a>

</div>

</main>

</body>
</html>

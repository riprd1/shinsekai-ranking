<style>
:root{
  --bg1:#0a0f1e;
  --bg2:#0b1530;

  --card:rgba(12,18,34,.75);
  --line:rgba(255,255,255,.14);

  --txt:#f7f9ff;
  --sub:rgba(247,249,255,.84);

  --accent:#9a86ff;
  --accent2:#6fc3ff;
}

body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background: linear-gradient(180deg, var(--bg1), var(--bg2));
  position:relative;
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:-50%;
  background:
    radial-gradient(circle at 20% 25%, rgba(111,195,255,.25), transparent 60%),
    radial-gradient(circle at 70% 20%, rgba(255,143,214,.20), transparent 60%),
    radial-gradient(circle at 55% 70%, rgba(154,134,255,.20), transparent 62%);
  animation: bubble 30s ease-in-out infinite;
  z-index:-2;
}
@keyframes bubble{
  0%{ transform: translate(0,0) rotate(0deg); }
  50%{ transform: translate(-2%, -3%) rotate(180deg); }
  100%{ transform: translate(0,0) rotate(360deg); }
}

.wrap{
  max-width:960px;
  margin:0 auto;
  padding:28px 18px 70px;
}

.hero{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:26px 20px;
  box-shadow:0 18px 54px rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
}

h1{
  margin:0 0 16px;
  font-size:21px;
  line-height:1.6;
  text-shadow:0 1px 14px rgba(0,0,0,.5);
}

.hero p{
  margin:0 0 20px;
  font-size:14px;
  line-height:2.1;
  color:var(--sub);
  text-shadow:0 1px 10px rgba(0,0,0,.35);
}

.btnRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:11px 18px;
  border-radius:999px;
  font-weight:900;
  font-size:13px;
  letter-spacing:.05em;
  text-decoration:none;
  color:#0b1022;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 12px 30px rgba(0,0,0,.35);
}

.btnSub{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 16px;
  border-radius:999px;
  font-weight:900;
  font-size:12.5px;
  text-decoration:none;
  color:rgba(255,255,255,.95);
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
}

.card{
  margin-top:22px;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(8px);
}

.card h2{
  margin:0 0 12px;
  font-size:16px;
}

ul{
  margin:0;
  padding-left:18px;
  color:var(--sub);
  line-height:2;
  font-size:14px;
}

.footer{
  margin-top:32px;
  padding-top:16px;
  border-top:1px solid var(--line);
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.footer a{
  padding:8px 14px;
  border-radius:999px;
  text-decoration:none;
  font-weight:900;
  font-size:12.5px;
  color:rgba(255,255,255,.95);
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.16);
}

.footer a:hover{
  background:rgba(255,255,255,.12);
}
</style>

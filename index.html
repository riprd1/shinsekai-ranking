<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>お問い合わせ｜日プ新世界まとめ</title>

<style>
  :root{
    --bg1:#0b0f1a;
    --bg2:#111a2e;
    --card:rgba(255,255,255,.08);
    --line:rgba(255,255,255,.12);
    --text:#f6f7fb;
    --sub:rgba(255,255,255,.75);
    --accent:#7c5cff;
    --accent2:#24c6ff;
  }

  body{
    margin:0;
    font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--text);
    background:
      radial-gradient(900px 500px at 20% 0%, rgba(124,92,255,.35), transparent 60%),
      radial-gradient(900px 500px at 80% 10%, rgba(36,198,255,.25), transparent 55%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
  }

  .wrap{
    max-width:720px;
    margin:40px auto;
    padding:20px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:18px;
    padding:20px;
    backdrop-filter: blur(10px);
  }

  h1{
    margin:0 0 16px;
    font-size:22px;
    line-height:1.4;
  }

  h2{
    margin:28px 0 10px;
    font-size:17px;
  }

  p{
    margin:0 0 16px;
    line-height:1.9;
    color:var(--sub);
    font-size:14px;
  }

  a{
    color:var(--accent2);
    text-decoration:none;
  }

  a:hover{
    text-decoration:underline;
  }

  .note{
    font-size:13px;
    opacity:0.7;
    margin-top:24px;
  }

  .back{
    display:inline-block;
    margin-top:24px;
    padding:10px 14px;
    border-radius:999px;
    font-weight:700;
    text-decoration:none;
    color:#081018;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
  }
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <h1>お問い合わせ</h1>

    <p>
      当サイトに関するお問い合わせは、以下の方法でお願いいたします。
    </p>

    <h2>連絡方法</h2>

    <p>
      <strong>X（旧Twitter）</strong><br>
      <a href="https://twitter.com/12agassi" target="_blank" rel="noopener">
        https://twitter.com/12agassi
      </a>
    </p>

    <p>
      <strong>メール</strong><br>
      <a href="mailto:fanvote.contact@gmail.com">
        fanvote.contact@gmail.com
      </a>
    </p>

    <p class="note">
      ※当サイトは非公式ファンサイトです。<br>
      ※権利者様からのご連絡には速やかに対応いたします。
    </p>

    <p class="note">
      最終更新：2026年
    </p>

    <a class="back" href="./index.html">トップページへ戻る</a>

  </div>
</div>

</body>
</html>

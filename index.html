<title>日プ新世界まとめ｜練習生情報・順位・投票リンク</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;

  --card:rgba(8,18,35,.64);
  --line:rgba(255,255,255,.10);

  --txt:#f7fbff;
  --sub:rgba(255,255,255,.82);

  --accent:#7dd3ff;   /* 水色 */
  --accent2:#4da3ff;  /* 青 */
  --accent3:#79ffe1;  /* ミント寄り */
}

/* ===== ベース ===== */
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background: linear-gradient(180deg, var(--bg1), var(--bg2));
  position:relative;
  overflow-x:hidden;
}

/* ===== 波（青〜水色）アニメーション =====
   3枚の「半透明の波」を別速度で流して、波っぽさを出す
*/
body::before,
body::after{
  content:"";
  position:fixed;
  left:-20%;
  width:140%;
  height:55vh;
  pointer-events:none;
  z-index:-2;
  filter: blur(10px);
  opacity:.85;
}

body::before{
  top:-12vh;
  background:
    radial-gradient(60% 140% at 10% 40%, rgba(125,211,255,.40), transparent 60%),
    radial-gradient(55% 120% at 70% 10%, rgba(77,163,255,.34), transparent 62%),
    radial-gradient(50% 130% at 90% 70%, rgba(121,255,225,.26), transparent 60%);
  animation: waveA 18s ease-in-out infinite;
}

body::after{
  bottom:-18vh;
  background:
    radial-gradient(60% 140% at 20% 30%, rgba(77,163,255,.32), transparent 62%),
    radial-gradient(55% 120% at 80% 40%, rgba(125,211,255,.30), transparent 60%),
    radial-gradient(50% 130% at 55% 80%, rgba(121,255,225,.20), transparent 60%);
  animation: waveB 22s ease-in-out infinite;
  z-index:-3;
  opacity:.75;
}

@keyframes waveA{
  0%   { transform: translate3d(0,0,0) rotate(0deg); }
  50%  { transform: translate3d(-6%, 2%,0) rotate(10deg); }
  100% { transform: translate3d(0,0,0) rotate(0deg); }
}
@keyframes waveB{
  0%   { transform: translate3d(0,0,0) rotate(0deg); }
  50%  { transform: translate3d(7%,-2%,0) rotate(-10deg); }
  100% { transform: translate3d(0,0,0) rotate(0deg); }
}

/* ===== もう1枚、細かい「さざ波」レイヤー ===== */
.waveFine{
  position:fixed;
  inset:-40% -40%;
  z-index:-4;
  pointer-events:none;
  opacity:.20;
  background:
    repeating-radial-gradient(circle at 30% 30%,
      rgba(125,211,255,.25) 0px,
      rgba(125,211,255,.25) 2px,
      transparent 10px,
      transparent 22px
    );
  filter: blur(18px);
  animation: waveFine 30s linear infinite;
}
@keyframes waveFine{
  from{ transform: translate3d(0,0,0) rotate(0deg); }
  to  { transform: translate3d(-6%, 4%,0) rotate(360deg); }
}

/* ===== レイアウト ===== */
.wrap{
  max-width:960px;
  margin:0 auto;
  padding:40px 18px 80px;
}

.hero{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:22px;
  padding:30px 22px;
  box-shadow:0 16px 46px rgba(0,0,0,.35);
  backdrop-filter: blur(10px);
}

.hero h1{
  margin:0 0 18px;
  font-size:20px;
  font-weight:700;
  letter-spacing:.04em;
  line-height:1.6;
  text-shadow:0 2px 10px rgba(0,0,0,.28);
}

.hero p{
  margin:0 0 18px;
  font-size:13.8px;
  line-height:2.1;
  color:var(--sub);
  text-shadow:0 1px 8px rgba(0,0,0,.20);
}

.btn{
  display:inline-block;
  padding:11px 18px;
  border-radius:999px;
  font-weight:800;
  font-size:13px;
  letter-spacing:.05em;
  text-decoration:none;
  color:#061325;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 10px 26px rgba(0,0,0,.35);
}

.grid{
  margin-top:26px;
  display:grid;
  grid-template-columns:1fr;
  gap:18px;
}

.card{
  background:rgba(8,18,35,.55);
  border:1px solid var(--line);
  border-radius:20px;
  padding:22px;
  box-shadow:0 10px 34px rgba(0,0,0,.25);
  backdrop-filter: blur(10px);
}

h2{
  margin:0 0 14px;
  font-size:16px;
  font-weight:800;
  letter-spacing:.03em;
  text-shadow:0 2px 10px rgba(0,0,0,.22);
}

ul{
  margin:0;
  padding-left:18px;
  color:var(--sub);
  font-size:13.6px;
  line-height:2.0;
}

/* ===== フッター（ここが薄い問題の改善ポイント） =====
   - 文字色を明るく
   - 影で背景に埋もれない
   - 背景を“薄い帯”にして確実に読める
*/
.footer{

  padding:18px 14px;
  border:1px solid var(--line);
  background:rgba(8,18,35,.55);
  border-radius:16px;

  text-align:center;
  font-size:13px;
  font-weight:800;
  letter-spacing:.04em;

  box-shadow:0 10px 30px rgba(0,0,0,.22);
  backdrop-filter: blur(10px);
}

.footer a{
  display:inline-block;
  padding:10px 14px;
  margin:0 6px 6px;
  border-radius:999px;

  color:rgba(255,255,255,.96); /* しっかり白 */
  text-decoration:none;

  border:1px solid rgba(255,255,255,.14);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));

  text-shadow:
    0 2px 10px rgba(0,0,0,.45),
    0 1px 0 rgba(0,0,0,.35);
}

.footer a:hover{
  border-color: rgba(125,211,255,.45);
  box-shadow:0 10px 26px rgba(0,0,0,.28);
  transform: translateY(-1px);
}

/* iPhoneで押しやすく */
@media (max-width:420px){
  .wrap{padding:34px 14px 70px}
  .hero{padding:26px 18px}
}

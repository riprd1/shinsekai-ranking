<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>日プ新世界まとめ｜練習生情報・順位・投票リンク</title>

  <style>
    :root{
      --bg1:#0b0f1a; --bg2:#111a2e;
      --card:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.12);
      --txt:#f6f7fb; --sub:rgba(255,255,255,.78);
      --accent:#7c5cff; --accent2:#24c6ff;
    }

    body{
      margin:0;
      color:var(--txt);
      font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
      background:
        radial-gradient(900px 500px at 20% 0%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(900px 500px at 80% 10%, rgba(36,198,255,.25), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:22px 14px 70px;
    }

    .hero{
      border:1px solid var(--line);
      border-radius:18px;
      background:linear-gradient(135deg, rgba(124,92,255,.18), rgba(36,198,255,.12));
      padding:22px 18px;
    }

    .hero h1{
      margin:0 0 18px;
      font-size:21px;
      line-height:1.5;
    }

    .hero p{
      margin:0 0 18px;
      line-height:2;
      color:var(--sub);
      font-size:14px;
    }

    .btn{
      display:inline-block;
      padding:12px 16px;
      border-radius:999px;
      font-weight:800;
      text-decoration:none;
      color:#081018;
      background:linear-gradient(90deg,var(--accent),var(--accent2));
      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      margin-top:20px;
    }

    .card{
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--card);
      padding:18px;
      backdrop-filter: blur(10px);
    }

    h2{
      margin:0 0 12px;
      font-size:17px;
    }

    ul{
      margin:0;
      padding-left:18px;
      color:var(--sub);
      line-height:1.9;
      font-size:14px;
    }

    .footer{
      margin-top:30px;
      padding-top:16px;
      border-top:1px solid var(--line);
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.65);
    }

    .footer a{
      color:rgba(255,255,255,.9);
      text-decoration:none;
      margin:0 8px;
    }

    .footer a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>
  <main class="wrap">

    <section class="hero">
      <h1>
        日プ新世界まとめ（非公式）｜<br>
        練習生情報・順位・投票リンク
      </h1>

      <p>
        当サイトは、PRODUCE 101 JAPAN 新世界を<br>
        応援する非公式ファンサイトです。<br>
        練習生の情報まとめ・順位メモ<br>
        投票ページへのリンクを掲載します。
      </p>

      <a class="btn" href="https://riprd1.github.io/fanvote-produce101japan/" target="_blank" rel="noopener">
        ▶ 投票ページへ（ツール）
      </a>
    </section>

    <section class="grid">
      <div class="card">
        <h2>これから追加する内容</h2>
        <ul>
          <li>練習生プロフィールまとめ（年齢・出身・身長など）</li>
          <li>順位の推移（更新ログ）</li>
          <li>SNSの反応まとめ</li>
          <li>投票のやり方（初心者向け）</li>
        </ul>
      </div>

      <div class="card">
        <h2>注意</h2>
        <ul>
          <li>当サイトは非公式です。公式とは関係ありません。</li>
          <li>権利者様からのご連絡には速やかに対応します。</li>
        </ul>
      </div>
    </section>

    <div class="footer">
      <a href="./about.html">About</a>
      <a href="./privacy.html">Privacy</a>
      <a href="./contact.html">Contact</a>
    </div>

  </main>
</body>
</html>

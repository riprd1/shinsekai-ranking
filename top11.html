<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>上位11人まとめ｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;
  --card:rgba(8,18,35,.72);
  --line:rgba(255,255,255,.12);
  --txt:#f7fbff;
  --sub:rgba(255,255,255,.88);
  --accent:#7dd3ff;
  --accent2:#4da3ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:28px 18px 70px;
}
h1{
  margin:0 0 10px;
  font-size:18px;
  font-weight:900;
}
.sub{
  font-size:12.5px;
  color:var(--sub);
  margin-bottom:14px;
  line-height:1.8;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media (min-width:760px){
  .grid{grid-template-columns:repeat(3,1fr);}
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  display:flex;
  gap:12px;
  align-items:center;
}
.avatar{
  width:64px;
  height:64px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.16);
  flex:0 0 auto;
  background:rgba(255,255,255,.06);
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.meta{flex:1; min-width:0;}
.rank{
  font-weight:900;
  font-size:12px;
  color:var(--accent);
}
.name{
  font-weight:900;
  font-size:14px;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.votes{
  font-size:12px;
  margin-top:4px;
  color:var(--sub);
}
.profileLink{
  margin-top:8px;
  display:inline-block;
  font-size:12px;
  font-weight:900;
  color:#061325;
  text-decoration:none;
  padding:6px 10px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.profileLink:active{ transform: translateY(1px); }

.notice{
  margin:10px 0 16px;
  padding:10px 12px;
  border-radius:12px;
  border:1px solid var(--line);
  background:rgba(8,18,35,.55);
  color:var(--sub);
  font-size:12.5px;
  line-height:1.75;
}

.footer{
  margin-top:24px;
  text-align:center;
}
.footer a{
  display:inline-block;
  margin:6px 8px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
}
</style>
</head>

<body>
<main class="wrap">

<h1>上位11人まとめ</h1>

<div class="sub">
  30秒ごとに自動更新されます。<br>
  もし更新されない場合は、ページを再読み込みしてください。
</div>

<div id="status" class="notice">読み込み中...</div>
<div id="ranking" class="grid"></div>

<div class="footer">
  <a href="./about.html">About</a>
  <a href="./privacy.html">Privacy</a>
  <a href="./contact.html">Contact</a>
</div>

</main>

<script src="./data.js"></script>

<script>
/* ========= ここだけあなたのCSV URLにする ========= */
const RANKING_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXFpCzSxBGA2HUi1iiTUAgbRTbKXn2StuWI-Og82Wcv1z02sAN5QMizZztFdC8-7He31T-ecZq8cPa/pub?gid=1769988094&single=true&output=csv";
/* =============================================== */

const MAX = 11;

function displayName(raw){
  return (raw || "").replace(/\s*\([^)]*\)\s*$/,"").trim();
}

function buildMap(){
  const map = {};
  const all = [...(window.traineesOnly||[]), ...(window.candidates||[])];
  all.forEach(m => { map[m.id] = m; });
  return map;
}

function setStatus(msg){
  document.getElementById("status").textContent = msg;
}

async function loadRanking(){
  try{
    // data.js が読めてないとプロフィール照合できないので先にチェック
    if(!Array.isArray(window.traineesOnly) || !Array.isArray(window.candidates)){
      setStatus("data.js が読み込めていません。ファイル名（data.js）と場所（同じフォルダ）を確認してください。");
      return;
    }

    const memberMap = buildMap();

    // Safari対策：キャッシュを確実に避ける（&_=${Date.now()}）
    const url = RANKING_CSV_URL + "&_=" + Date.now();

    const res = await fetch(url, { cache:"no-store" });
    if(!res.ok) throw new Error("CSV取得に失敗しました（HTTP " + res.status + "）");

    const text = await res.text();
    const lines = text.trim().split(/\r?\n/);
    if(lines.length <= 1) throw new Error("CSVが空か、形式が違います");

    // ヘッダーを除外
    const rows = lines.slice(1);

    let data = rows.map(r=>{
      const c = r.split(",");
      return {
        id: (c[0]||"").trim(),
        votes: Number((c[1]||"0").trim()),
        rank: Number((c[2]||"0").trim())
      };
    }).filter(x=>x.id && x.rank)
      .sort((a,b)=>a.rank-b.rank);

    const withdrawn = window.WITHDRAWN_IDS instanceof Set ? window.WITHDRAWN_IDS : new Set();

    const filtered = [];
    for(const p of data){
      if(withdrawn.has(p.id)) continue;
      filtered.push(p);
      if(filtered.length >= MAX) break;
    }

    const container = document.getElementById("ranking");
    container.innerHTML = "";

    if(filtered.length === 0){
      setStatus("ランキングデータが見つかりませんでした。CSVの列（id,votes,rank）を確認してください。");
      return;
    }

    filtered.forEach(p=>{
      const m = memberMap[p.id] || {name:p.id, img:""};
      const jp = displayName(m.name);

      container.insertAdjacentHTML("beforeend", `
        <div class="card">
          <div class="avatar">
            <img src="${m.img}" alt="${jp}" onerror="this.style.display='none'">
          </div>
          <div class="meta">
            <div class="rank">${p.rank}位</div>
            <div class="name">${jp}</div>
            <div class="votes">${p.votes.toLocaleString()}票</div>
            <a class="profileLink" href="./profile.html?id=${encodeURIComponent(p.id)}">Profile</a>
          </div>
        </div>
      `);
    });

    setStatus("最終更新：" + new Date().toLocaleTimeString("ja-JP") + "（30秒ごとに更新）");
  }catch(err){
    console.error(err);
    setStatus("読み込みに失敗しました： " + err.message + " ／ CSVを直接確認：" + RANKING_CSV_URL);
  }
}

loadRanking();
setInterval(loadRanking, 30000);
</script>

</body>
</html>

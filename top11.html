<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>上位11人まとめ｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;
  --card:rgba(8,18,35,.72);
  --line:rgba(255,255,255,.12);
  --txt:#f7fbff;
  --sub:rgba(255,255,255,.88);
  --accent:#7dd3ff;
  --accent2:#4da3ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:28px 18px 70px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.28);
}
.btnMain{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:900;
  color:#061325;
  text-decoration:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 8px 22px rgba(0,0,0,.35);
}
h1{
  margin:0 0 6px;
  font-size:18px;
  font-weight:900;
}
.sub{
  font-size:13px;
  color:var(--sub);
  margin-bottom:14px;
  line-height:1.8;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media (min-width:760px){
  .grid{grid-template-columns:repeat(3,1fr);}
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  display:flex;
  gap:12px;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}
.avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:20px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#061325;
  flex:0 0 auto;
}
.meta{flex:1}
.rank{
  font-weight:900;
  font-size:12px;
  color:var(--accent);
}
.name{
  font-weight:900;
  font-size:14px;
  margin-top:4px;
}
.votes{
  font-size:12px;
  margin-top:4px;
  color:var(--sub);
}
.profileBtn{
  margin-top:8px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  font-weight:900;
  color:#061325;
  text-decoration:none;
  padding:6px 10px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.notice{
  margin-top:18px;
  font-size:13px;
  line-height:1.9;
  color:rgba(255,255,255,.85);
}
.footer{
  margin-top:22px;
  text-align:center;
}
.footer a{
  display:inline-block;
  margin:6px 8px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
}
</style>
</head>

<body>
<main class="wrap">

<div class="topbar">
  <a class="pill" href="./index.html">← トップへ</a>
  <a class="btnMain" href="https://riprd1.github.io/fanvote-produce101japan/" target="_blank" rel="noopener">
    投票へ移動🗳
  </a>
</div>

<h1>上位11人ランキング</h1>
<div class="sub">
  最新の投票データをもとに表示しています。<br>
  30秒ごとに自動更新されます。
</div>

<div id="ranking" class="grid">読み込み中...</div>

<div class="notice">
  ※当サイトは非公式のファン向け情報まとめサイトです。<br>
  番組公式とは一切関係ありません。
</div>

<div class="footer">
  <a href="./about.html">About</a>
  <a href="./privacy.html">Privacy</a>
  <a href="./contact.html">Contact</a>
</div>

</main>

<script src="./data.js"></script>

<script>
const MAX = 11;
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXFpCzSxBGA2HUi1iiTUAgbRTbKXn2StuWI-Og82Wcv1z02sAN5QMizZztFdC8-7He31T-ecZq8cPa/pub?gid=1769988094&single=true&output=csv";

function displayName(raw){
  return (raw || "").replace(/\s*\([^)]*\)\s*$/,"").trim();
}

function buildMap(){
  const map = {};
  const all = [...(window.traineesOnly||[]), ...(window.candidates||[])];
  all.forEach(m => { map[m.id] = m; });
  return map;
}

async function loadRanking(){
  const container = document.getElementById("ranking");
  const withdrawn = window.WITHDRAWN_IDS || new Set();
  const memberMap = buildMap();

  try{
    const res = await fetch(CSV_URL,{cache:"no-store"});
    const text = await res.text();
    const rows = text.trim().split(/\r?\n/).slice(1);

    let data = rows.map(r=>{
      const c=r.split(",");
      return {
        id:c[0]?.trim(),
        votes:Number(c[1]),
        rank:Number(c[2])
      };
    }).filter(x=>x.id).sort((a,b)=>a.rank-b.rank);

    const filtered=[];
    for(const p of data){
      if(withdrawn.has(p.id)) continue;
      filtered.push(p);
      if(filtered.length>=MAX) break;
    }

    container.innerHTML="";

    filtered.forEach(p=>{
      const m=memberMap[p.id]||{name:p.id,id:p.id};
      const jp=displayName(m.name);

      container.innerHTML+=`
        <div class="card">
          <div class="avatar">${jp.charAt(0)}</div>
          <div class="meta">
            <div class="rank">${p.rank}位</div>
            <div class="name">${jp}</div>
            <div class="votes">${p.votes.toLocaleString()}票</div>
            <a class="profileBtn" href="./profile.html?id=${p.id}">PROFILE</a>
          </div>
        </div>
      `;
    });

  }catch(e){
    container.innerHTML="データ取得に失敗しました。";
  }
}

loadRanking();
setInterval(loadRanking,30000);
</script>

</body>
</html>

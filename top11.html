<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>上位11人まとめ｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;
  --card:rgba(8,18,35,.72);
  --line:rgba(255,255,255,.12);
  --txt:#f7fbff;
  --sub:rgba(255,255,255,.88);
  --accent:#7dd3ff;
  --accent2:#4da3ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}
.wrap{
  max-width:820px;
  margin:0 auto;
  padding:28px 18px 70px;
}
h1{
  font-size:20px;
  margin-bottom:16px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media (min-width:720px){
  .grid{grid-template-columns:repeat(3,1fr);}
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px;
  box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.rank{
  font-weight:900;
  font-size:13px;
  color:#7dd3ff;
}
.name{
  margin-top:8px;
  font-weight:700;
}
.votes{
  margin-top:4px;
  font-size:12px;
  color:var(--sub);
}
.footer{
  margin-top:30px;
  text-align:center;
}
.footer a{
  margin:6px;
  display:inline-block;
  padding:8px 16px;
  border-radius:999px;
  text-decoration:none;
  font-size:12px;
  font-weight:700;
  color:#fff;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
}
</style>
</head>

<body>
<main class="wrap">

<h1>上位11人まとめ（自動更新）</h1>

<div id="ranking" class="grid">
  読み込み中...
</div>

<div class="footer">
  <a href="./index.html">Top</a>
  <a href="./privacy.html">Privacy</a>
  <a href="./about.html">About</a>
  <a href="./contact.html">Contact</a>
</div>

</main>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXFpCzSxBGA2HUi1iiTUAgbRTbKXn2StuWI-Og82Wcv1z02sAN5QMizZztFdC8-7He31T-ecZq8cPa/pub?gid=1769988094&single=true&output=csv";

async function loadRanking(){
  const res = await fetch(CSV_URL);
  const text = await res.text();
  const rows = text.trim().split("\n").slice(1); // 1行目はヘッダー

  const data = rows.map(row=>{
    const [id, votes, rank] = row.split(",");
    return {
      id,
      votes: Number(votes),
      rank: Number(rank)
    };
  });

  // rank順に並び替え
  data.sort((a,b)=>a.rank-b.rank);

  // 上位11人
  const top11 = data.slice(0,11);

  const container = document.getElementById("ranking");
  container.innerHTML = "";

  top11.forEach(person=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <div class="rank">${person.rank}位</div>
      <div class="name">${person.id}</div>
      <div class="votes">${person.votes.toLocaleString()}票</div>
    `;
    container.appendChild(div);
  });
}

loadRanking();
setInterval(loadRanking,30000); // 30秒ごと更新
</script>

</body>
</html>

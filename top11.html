<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>上位11人まとめ｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;
  --card:rgba(8,18,35,.72);
  --line:rgba(255,255,255,.12);
  --txt:#f7fbff;
  --sub:rgba(255,255,255,.88);
  --accent:#7dd3ff;
  --accent2:#4da3ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:28px 18px 70px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
h1{
  margin:0;
  font-size:18px;
  font-weight:900;
}
.sub{
  font-size:12.5px;
  color:var(--sub);
  margin-top:4px;
}
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
}
.btnMain{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:900;
  color:#061325;
  text-decoration:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 8px 22px rgba(0,0,0,.35);
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media (min-width:760px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:12px;
  display:flex;
  gap:12px;
  align-items:center;
}
.avatar{
  width:64px;
  height:64px;
  border-radius:14px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.16);
  flex:0 0 auto;
  background:rgba(255,255,255,.06);
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.meta{flex:1}
.rank{
  font-weight:900;
  font-size:12px;
  color:var(--accent);
}
.name{
  font-weight:900;
  font-size:14px;
  margin-top:4px;
}
.votes{
  font-size:12px;
  margin-top:4px;
  color:var(--sub);
}
.profileLink{
  margin-top:8px;
  display:inline-block;
  font-size:12px;
  font-weight:900;
  color:#061325;
  text-decoration:none;
  padding:6px 10px;
  border-radius:999px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.notice{
  margin-top:16px;
  font-size:12px;
  color:rgba(255,255,255,.80);
}
.footer{
  margin-top:24px;
  text-align:center;
}
.footer a{
  display:inline-block;
  margin:6px 8px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
}
</style>
</head>

<body>
<main class="wrap">

<div class="topbar">
  <div>
    <h1>上位11人まとめ</h1>
    <div class="sub">30秒ごとに自動更新されます</div>
  </div>
  <div style="display:flex; gap:8px;">
    <a class="pill" href="./index.html">← Top</a>
    <a class="btnMain" href="https://riprd1.github.io/fanvote-produce101japan/" target="_blank" rel="noopener">
      投票へ移動🗳
    </a>
  </div>
</div>

<div id="ranking" class="grid">
  読み込み中...
</div>

<div class="notice">
  ※当ページは非公式ファンサイトです。公式とは関係ありません。
</div>

<div class="footer">
  <a href="./about.html">About</a>
  <a href="./privacy.html">Privacy</a>
  <a href="./contact.html">Contact</a>
</div>

</main>

<!-- ★ データを読み込む -->
<script src="./data.js"></script>

<script>
const MAX = 11;
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXFpCzSxBGA2HUi1iiTUAgbRTbKXn2StuWI-Og82Wcv1z02sAN5QMizZztFdC8-7He31T-ecZq8cPa/pub?gid=1769988094&single=true&output=csv";

function displayName(raw){
  return (raw || "").replace(/\s*\([^)]*\)\s*$/,"").trim();
}

function buildMap(){
  const map = {};
  const all = [...(window.traineesOnly||[]), ...(window.candidates||[])];
  all.forEach(m => { map[m.id] = m; });
  return map;
}

async function loadRanking(){
  try{
    const memberMap = buildMap();
    const res = await fetch(CSV_URL, {cache:"no-store"});
    const text = await res.text();
    const rows = text.trim().split("\n").slice(1);

    let data = rows.map(r=>{
      const c=r.split(",");
      return {
        id:c[0].trim(),
        votes:Number(c[1]),
        rank:Number(c[2])
      };
    }).sort((a,b)=>a.rank-b.rank);

    const filtered=[];
    for(const p of data){
      if(window.WITHDRAWN_IDS && window.WITHDRAWN_IDS.has(p.id)) continue;
      filtered.push(p);
      if(filtered.length>=MAX) break;
    }

    const container=document.getElementById("ranking");
    container.innerHTML="";

    filtered.forEach(p=>{
      const m=memberMap[p.id]||{name:p.id,img:""};
      const jp=displayName(m.name);

      container.innerHTML+=`
        <div class="card">
          <div class="avatar">
            <img src="${m.img}" alt="${jp}"
              onerror="this.src='https://i.imgur.com/8fK4h6y.png';">
          </div>
          <div class="meta">
            <div class="rank">${p.rank}位</div>
            <div class="name">${jp}</div>
            <div class="votes">${Number(p.votes||0).toLocaleString()}票</div>
            <a class="profileLink" href="./profile.html?id=${p.id}">Profile</a>
          </div>
        </div>
      `;
    });

  }catch(e){
    document.getElementById("ranking").innerHTML =
      "ランキングを取得できませんでした。時間をおいて再読み込みしてください。";
  }
}

loadRanking();
setInterval(loadRanking,30000);
</script>

</body>
</html>

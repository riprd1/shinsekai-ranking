<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>上位11人まとめ｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg:#ffffff;
  --card:#ffffff;
  --line:#e5e7eb;

  --txt:#111827;
  --sub:#4b5563;

  --accent:#2563eb;
  --accent2:#7dd3fc;

  --shadow:0 16px 40px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:var(--bg);
  overflow-x:hidden;
  position:relative;
}

/* ===== 背景：シャボン玉＋波 ===== */
body::before,
body::after{
  content:"";
  position:fixed;
  inset:-25%;
  pointer-events:none;
  z-index:-2;
  filter: blur(44px);
  opacity:.95;
}
body::before{
  background:
    radial-gradient(circle at 18% 25%, rgba(125,211,252,.38), transparent 45%),
    radial-gradient(circle at 72% 18%, rgba(196,181,253,.38), transparent 46%),
    radial-gradient(circle at 42% 78%, rgba(253,186,116,.30), transparent 46%),
    radial-gradient(circle at 82% 72%, rgba(147,197,253,.30), transparent 48%),
    radial-gradient(circle at 30% 52%, rgba(167,243,208,.28), transparent 48%),
    radial-gradient(circle at 60% 55%, rgba(252,165,165,.24), transparent 50%);
  animation:bubbles 18s ease-in-out infinite alternate;
}
body::after{
  background:
    radial-gradient(60% 110% at 20% 35%, rgba(125,211,252,.22), transparent 62%),
    radial-gradient(65% 120% at 85% 30%, rgba(196,181,253,.22), transparent 62%),
    radial-gradient(70% 120% at 55% 85%, rgba(253,186,116,.18), transparent 62%);
  animation:waves 22s ease-in-out infinite alternate;
}
@keyframes bubbles{
  0%{ transform: translate(0px, 0px) scale(1); }
  100%{ transform: translate(-18px, -36px) scale(1.03); }
}
@keyframes waves{
  0%{ transform: translateX(0px) translateY(0px) scale(1); }
  100%{ transform: translateX(40px) translateY(-14px) scale(1.02); }
}

/* ===== layout ===== */
.wrap{
  width: min(900px, 100%);
  max-width:900px;
  margin:0 auto;
  padding:44px 18px 90px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:18px;
}

/* 戻るボタン */
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 16px;
  border-radius:12px;
  font-size:14px;
  font-weight:900;
  color:var(--txt);
  text-decoration:none;
  background:rgba(255,255,255,.85);
  border:1px solid var(--line);
  box-shadow:0 10px 24px rgba(0,0,0,.06);
  transition:.2s ease;
}
.pill:hover{
  background:#f9fafb;
  transform:translateY(-1px);
}

/* 投票ボタン */
.btnMain{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 18px;
  border-radius:12px;
  font-size:14px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 12px 26px rgba(37,99,235,.25);
  transition:.2s ease;
}
.btnMain:hover{
  transform:translateY(-2px);
}

h1{
  margin:0 0 8px;
  font-size:20px;
  font-weight:900;
  color:#111827;
}

.sub{
  font-size:14px;
  color:var(--sub);
  margin-bottom:20px;
  line-height:1.9;
}

/* ===== ranking grid ===== */
.grid{
  display:grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap:16px;
}
@media (min-width:760px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

.card{
  background:rgba(255,255,255,.92);
  border:1px solid var(--line);
  border-radius:20px;
  padding:16px;
  display:flex;
  gap:14px;
  align-items:center;
  box-shadow:var(--shadow);
  backdrop-filter:blur(6px);
}

.avatar{
  width:64px;
  height:64px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:20px;
  background:linear-gradient(135deg,#e0f2fe,#ede9fe);
  color:#111827;
  border:1px solid #e5e7eb;
  flex:0 0 auto;
}

.meta{flex:1}

.rank{
  font-weight:900;
  font-size:13px;
  color:var(--accent);
}

.name{
  font-weight:900;
  font-size:15px;
  margin-top:6px;
  color:#111827;
}

.votes{
  font-size:13px;
  margin-top:6px;
  color:var(--sub);
}

.profileBtn{
  margin-top:10px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  padding:8px 14px;
  border-radius:12px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 10px 22px rgba(37,99,235,.22);
  transition:.2s ease;
}
.profileBtn:hover{
  transform:translateY(-2px);
}

.notice{
  margin-top:24px;
  font-size:14px;
  line-height:1.9;
  color:#6b7280;
}

.footer{
  margin-top:28px;
  text-align:center;
}
.footer a{
  display:inline-block;
  margin:8px 10px;
  padding:8px 16px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  color:#2563eb;
  text-decoration:none;
  background:rgba(255,255,255,.70);
  border:1px solid var(--line);
  box-shadow:0 10px 22px rgba(0,0,0,.05);
  transition:.2s ease;
}
.footer a:hover{
  transform:translateY(-1px);
  background:#ffffff;
  text-decoration:underline;
}
</style>
</head>

<body>
<main class="wrap">

<div class="topbar">
  <a class="pill" href="./index.html">← トップへ</a>
  <a class="btnMain" href="https://riprd1.github.io/fanvote-produce101japan/" target="_blank" rel="noopener">
    投票へ移動🗳
  </a>
</div>

<h1>上位11人ランキング</h1>
<div class="sub">
  最新の投票データをもとに表示しています。<br>
  30秒ごとに自動更新されます。
</div>

<div id="ranking" class="grid">読み込み中...</div>

<div class="notice">
  ※当サイトは非公式のファン向け情報まとめサイトです。<br>
  番組公式とは一切関係ありません。
</div>

<div class="footer">
  <a href="./about.html">About</a>
  <a href="./privacy.html">Privacy</a>
  <a href="./contact.html">Contact</a>
</div>

</main>

<script src="./data.js"></script>

<script>
const MAX = 11;
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXFpCzSxBGA2HUi1iiTUAgbRTbKXn2StuWI-Og82Wcv1z02sAN5QMizZztFdC8-7He31T-ecZq8cPa/pub?gid=1769988094&single=true&output=csv";

function displayName(raw){
  return (raw || "").replace(/\s*\([^)]*\)\s*$/,"").trim();
}

function buildMap(){
  const map = {};
  const all = [...(window.traineesOnly||[]), ...(window.candidates||[])];
  all.forEach(m => { map[m.id] = m; });
  return map;
}

async function loadRanking(){
  const container = document.getElementById("ranking");
  const withdrawn = window.WITHDRAWN_IDS || new Set();
  const memberMap = buildMap();

  try{
    const res = await fetch(CSV_URL,{cache:"no-store"});
    const text = await res.text();
    const rows = text.trim().split(/\r?\n/).slice(1);

    let data = rows.map(r=>{
      const c=r.split(",");
      return {
        id:c[0]?.trim(),
        votes:Number(c[1]),
        rank:Number(c[2])
      };
    }).filter(x=>x.id).sort((a,b)=>a.rank-b.rank);

    const filtered=[];
    for(const p of data){
      if(withdrawn.has(p.id)) continue;
      filtered.push(p);
      if(filtered.length>=MAX) break;
    }

    container.innerHTML="";

    filtered.forEach(p=>{
      const m=memberMap[p.id]||{name:p.id,id:p.id};
      const jp=displayName(m.name);

      container.innerHTML+=`
        <div class="card">
          <div class="avatar">${jp.charAt(0)}</div>
          <div class="meta">
            <div class="rank">${p.rank}位</div>
            <div class="name">${jp}</div>
            <div class="votes">${p.votes.toLocaleString()}票</div>
            <a class="profileBtn" href="./profile.html?id=${p.id}">PROFILE</a>
          </div>
        </div>
      `;
    });

  }catch(e){
    container.innerHTML="データ取得に失敗しました。";
  }
}

loadRanking();
setInterval(loadRanking,30000);
</script>

</body>
</html>

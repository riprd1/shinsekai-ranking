<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contact｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg:#ffffff;
  --line:#e5e7eb;
  --txt:#111827;
  --sub:#4b5563;
  --accent:#2563eb;
  --accent2:#7dd3fc;
  --shadow:0 16px 40px rgba(0,0,0,.08);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:var(--bg);
  overflow-x:hidden;
  position:relative;
}

/* 背景（他ページと統一） */
body::before,
body::after{
  content:"";
  position:fixed;
  inset:-25%;
  pointer-events:none;
  z-index:-2;
  filter: blur(44px);
  opacity:.95;
}
body::before{
  background:
    radial-gradient(circle at 18% 25%, rgba(125,211,252,.38), transparent 45%),
    radial-gradient(circle at 72% 18%, rgba(196,181,253,.38), transparent 46%),
    radial-gradient(circle at 42% 78%, rgba(253,186,116,.30), transparent 46%);
}
body::after{
  background:
    radial-gradient(60% 110% at 20% 35%, rgba(125,211,252,.22), transparent 62%),
    radial-gradient(65% 120% at 85% 30%, rgba(196,181,253,.22), transparent 62%);
}

.wrap{
  max-width:900px;
  margin:0 auto;
  padding:44px 18px 90px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.pill{
  padding:10px 16px;
  border-radius:12px;
  font-size:14px;
  font-weight:900;
  color:var(--txt);
  text-decoration:none;
  background:#ffffff;
  border:1px solid var(--line);
  box-shadow:0 8px 20px rgba(0,0,0,.05);
}

h1{
  font-size:20px;
  margin:0 0 10px;
  font-weight:900;
}

.sub{
  font-size:14px;
  color:var(--sub);
  line-height:1.9;
  margin-bottom:24px;
}

.card{
  background:#ffffff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:24px;
  box-shadow:var(--shadow);
  text-align:center;
}

.btnMain{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:12px 20px;
  border-radius:12px;
  font-size:14px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 12px 26px rgba(37,99,235,.25);
  transition:.2s ease;
}
.btnMain:hover{
  transform:translateY(-2px);
}

.small{
  margin-top:16px;
  font-size:13px;
  color:#6b7280;
  line-height:1.8;
}

.footer{
  margin-top:40px;
  text-align:center;
}
.footer a{
  display:inline-block;
  margin:6px 8px;
  padding:8px 16px;
  border-radius:10px;
  font-size:13px;
  font-weight:800;
  color:#2563eb;
  text-decoration:none;
  border:1px solid var(--line);
}
.footer a:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<main class="wrap">

  <div class="topbar">
    <a class="pill" href="./index.html">← トップへ</a>
  </div>

  <h1>Contact</h1>
  <p class="sub">
    掲載内容の修正依頼・削除依頼・ご意見などは、以下のフォームよりお願いいたします。
  </p>

  <div class="card">
    <a class="btnMain" href="https://forms.gle/SLpH5VrHm5173Dh19" target="_blank" rel="noopener">
      お問い合わせフォームを開く
    </a>

    <div class="small">
      ※当サイトは非公式のファンサイトです。<br>
      ※番組公式・事務局へのお問い合わせは公式窓口をご利用ください。<br>
      ※誹謗中傷や個人情報の送信はお控えください。
    </div>
  </div>

  <div class="footer">
    <a href="./about.html">About</a>
    <a href="./privacy.html">Privacy</a>
    <a href="./contact.html">Contact</a>
  </div>

</main>

</body>
</html>

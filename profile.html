<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>プロフィール｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;
  --card:rgba(8,18,35,.72);
  --line:rgba(255,255,255,.12);
  --txt:#f7fbff;
  --sub:rgba(255,255,255,.88);
  --accent:#7dd3ff;
  --accent2:#4da3ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}
.wrap{
  max-width:820px;
  margin:0 auto;
  padding:28px 18px 70px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.28);
}
.btnMain{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:900;
  color:#061325;
  text-decoration:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 8px 22px rgba(0,0,0,.35);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:18px;
  box-shadow:0 16px 40px rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
}

.header{
  display:flex;
  gap:14px;
  align-items:center;
}
.avatar{
  width:92px;
  height:92px;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.18);
  flex:0 0 auto;
  background:rgba(255,255,255,.06);
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.name{
  font-weight:900;
  font-size:18px;
  line-height:1.4;
}
.meta{
  margin-top:6px;
  color:var(--sub);
  font-size:12.8px;
  line-height:1.7;
}
.hr{
  height:1px;
  background:rgba(255,255,255,.14);
  margin:14px 0;
  border-radius:999px;
}
.note{
  color:rgba(255,255,255,.80);
  font-size:12.5px;
  line-height:1.85;
}
.small{
  color:rgba(255,255,255,.78);
  font-size:12px;
  margin-top:10px;
  line-height:1.8;
}

.footer{
  margin-top:22px;
  text-align:center;
}
.footer a{
  display:inline-block;
  margin:6px 8px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
}
</style>
</head>

<body>
<main class="wrap">

  <div class="topbar">
    <a class="pill" href="./top11.html">← 上位11人へ</a>
    <a class="btnMain" href="https://riprd1.github.io/fanvote-produce101japan/" target="_blank" rel="noopener">投票へ移動🗳</a>
  </div>

  <section class="card" id="profileCard">
    読み込み中...
  </section>

  <div class="footer">
    <a href="./about.html">About</a>
    <a href="./privacy.html">Privacy</a>
    <a href="./contact.html">Contact</a>
  </div>

</main>

<!-- ★ データはここから読み込む（超重要） -->
<script src="./data.js"></script>

<script>
function getParam(name){
  const u = new URL(location.href);
  return u.searchParams.get(name);
}

function displayName(raw){
  return (raw || "").replace(/\s*\([^)]*\)\s*$/,"").trim();
}

function buildMap(){
  const map = {};
  const all = [...(window.traineesOnly||[]), ...(window.candidates||[])];
  all.forEach(m => { map[m.id] = m; });
  return map;
}

(function render(){
  const id = getParam("id");
  const card = document.getElementById("profileCard");

  if(!id){
    card.innerHTML = `
      <div class="name">プロフィールが見つかりません</div>
      <div class="meta">URLに id がありません。</div>
      <div class="hr"></div>
      <a class="pill" href="./top11.html">← 上位11人へ戻る</a>
    `;
    return;
  }

  const withdrawn = window.WITHDRAWN_IDS && window.WITHDRAWN_IDS.has(id);
  const map = buildMap();
  const m = map[id];

  if(!m){
    card.innerHTML = `
      <div class="name">プロフィールが見つかりません</div>
      <div class="meta">ID：${id}</div>
      <div class="hr"></div>
      <a class="pill" href="./top11.html">← 上位11人へ戻る</a>
    `;
    return;
  }

  const jp = displayName(m.name);

  card.innerHTML = `
    <div class="header">
      <div class="avatar">
        <img src="${m.img}" alt="${jp}" onerror="this.src='https://i.imgur.com/8fK4h6y.png';">
      </div>
      <div>
        <div class="name">${jp}</div>
        <div class="meta">
          ID：${m.id}<br>
          区分：${(window.traineesOnly||[]).some(x=>x.id===m.id) ? "練習生" : "練習生候補"}
          ${withdrawn ? "<br><strong style='color:#ffd1d1;'>※辞退</strong>" : ""}
        </div>
      </div>
    </div>

    <div class="hr"></div>

    <div class="note">
      このページは非公式のファン向けまとめです。公式とは関係ありません。<br>
      掲載内容はできるだけ正確に整備しますが、完全な保証はできません。
    </div>

    <div class="small">
      ※画像が表示されない場合は、時間をおいて再読み込みしてください。
    </div>
  `;
})();
</script>

</body>
</html>

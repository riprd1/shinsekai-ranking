<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>プロフィール｜日プ新世界まとめ（非公式）</title>

<style>
:root{
  --bg1:#061325;
  --bg2:#0b2040;
  --card:rgba(8,18,35,.72);
  --line:rgba(255,255,255,.12);
  --txt:#f7fbff;
  --sub:rgba(255,255,255,.88);
  --accent:#7dd3ff;
  --accent2:#4da3ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Hiragino Sans","Noto Sans JP",-apple-system,BlinkMacSystemFont,sans-serif;
  color:var(--txt);
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
}
.wrap{
  max-width:820px;
  margin:0 auto;
  padding:28px 18px 70px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:8px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.28);
}
.btnMain{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:9px 14px;
  border-radius:999px;
  font-size:12.5px;
  font-weight:900;
  color:#061325;
  text-decoration:none;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  box-shadow:0 8px 22px rgba(0,0,0,.35);
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:16px;
  padding:20px;
  box-shadow:0 16px 40px rgba(0,0,0,.35);
}

.header{
  display:flex;
  gap:16px;
  align-items:center;
}

.avatar{
  width:96px;
  height:96px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:32px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#061325;
  flex:0 0 auto;
}

.name{
  font-weight:900;
  font-size:20px;
  line-height:1.4;
}

.meta{
  margin-top:6px;
  font-size:13px;
  color:var(--sub);
  line-height:1.8;
}

.hr{
  height:1px;
  background:rgba(255,255,255,.14);
  margin:18px 0;
  border-radius:999px;
}

.sectionTitle{
  font-weight:900;
  font-size:14px;
  margin-bottom:8px;
}

.note{
  font-size:13px;
  line-height:1.9;
  color:rgba(255,255,255,.85);
}

.footer{
  margin-top:22px;
  text-align:center;
}
.footer a{
  display:inline-block;
  margin:6px 8px;
  padding:8px 16px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#fff;
  text-decoration:none;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
}
</style>
</head>

<body>
<main class="wrap">

<div class="topbar">
  <a class="pill" href="./top11.html">← 上位11人へ</a>
  <a class="btnMain" href="https://riprd1.github.io/fanvote-produce101japan/" target="_blank" rel="noopener">
    投票へ移動🗳
  </a>
</div>

<section class="card" id="profileCard">
  読み込み中...
</section>

<div class="footer">
  <a href="./about.html">About</a>
  <a href="./privacy.html">Privacy</a>
  <a href="./contact.html">Contact</a>
</div>

</main>

<script src="./data.js"></script>

<script>
function getParam(name){
  const u = new URL(location.href);
  return u.searchParams.get(name);
}

function displayName(raw){
  return (raw || "").replace(/\s*\([^)]*\)\s*$/,"").trim();
}

function buildMap(){
  const map = {};
  const all = [...(window.traineesOnly||[]), ...(window.candidates||[])];
  all.forEach(m => { map[m.id] = m; });
  return map;
}

(function render(){
  const id = getParam("id");
  const card = document.getElementById("profileCard");

  if(!id){
    card.innerHTML = `
      <div class="name">プロフィールが見つかりません</div>
      <div class="meta">URLにIDがありません。</div>
    `;
    return;
  }

  const map = buildMap();
  const withdrawn = window.WITHDRAWN_IDS || new Set();
  const m = map[id];

  if(!m){
    card.innerHTML = `
      <div class="name">プロフィールが見つかりません</div>
      <div class="meta">ID：${id}</div>
    `;
    return;
  }

  const jp = displayName(m.name);
  const firstLetter = jp.charAt(0);

  card.innerHTML = `
    <div class="header">
      <div class="avatar">${firstLetter}</div>
      <div>
        <div class="name">${jp}</div>
        <div class="meta">
          ID：${m.id}<br>
          区分：${(window.traineesOnly||[]).some(x=>x.id===m.id) ? "練習生" : "練習生候補"}
          ${withdrawn.has(id) ? "<br><strong style='color:#ffd1d1;'>※辞退</strong>" : ""}
        </div>
      </div>
    </div>

    <div class="hr"></div>

    <div class="sectionTitle">プロフィール概要</div>
    <div class="note">
      このページはファン向けの非公式情報まとめページです。<br>
      投票状況や順位変動を確認するための補助情報として掲載しています。
    </div>

    <div class="hr"></div>

    <div class="sectionTitle">応援メモ</div>
    <div class="note">
      推しを応援するために、公式投票ページから毎日投票を行いましょう。<br>
      詳細な投票方法は「投票ガイド」ページをご覧ください。
    </div>
  `;
})();
</script>

</body>
</html>

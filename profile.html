<script>
function getParam(name){
  const u = new URL(location.href);
  return u.searchParams.get(name);
}
function displayName(raw){
  return (raw || "").replace(/\s*\([^)]*\)\s*$/,"").trim();
}
function buildMap(){
  const map = {};
  const all = [...(window.traineesOnly||[]), ...(window.candidates||[])];
  all.forEach(m => { map[m.id] = m; });
  return map;
}
function firstCharJP(name){
  const s = (name||"").trim();
  return s ? s.charAt(0) : "?";
}

(function render(){
  const id = getParam("id");
  const card = document.getElementById("profileCard");

  if(!id){
    card.innerHTML = `
      <div class="name">プロフィールが見つかりません</div>
      <div class="meta">URLにIDがありません。</div>
    `;
    return;
  }

  const map = buildMap();
  const withdrawn = window.WITHDRAWN_IDS || new Set();
  const m = map[id];

  if(!m){
    card.innerHTML = `
      <div class="name">プロフィールが見つかりません</div>
      <div class="meta">ID：${id}</div>
    `;
    return;
  }

  const jp = displayName(m.name);
  const firstLetter = firstCharJP(jp);

  card.innerHTML = `
    <div class="header">
      <div class="avatar">${firstLetter}</div>
      <div>
        <div class="name">${jp}</div>
        <div class="meta">
          ID：${m.id}<br>
          区分：${(window.traineesOnly||[]).some(x=>x.id===m.id) ? "練習生" : "練習生候補"}
          ${withdrawn.has(id) ? "<br><strong style='color:#ffd1d1;'>※辞退</strong>" : ""}
        </div>
      </div>
    </div>

    <div class="hr"></div>

      <div class="sectionTitle">プロフィール概要</div>
      <div class="note">
        詳細プロフィールは準備中です。
      </div>
    `}

      ※記載内容はできるだけ正確に整備しますが、正確性・最新性を保証するものではありません。
    </div>
  `;
})();
